version: "3.8"

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: avemaria
      MYSQL_USER: avemariauser
      MYSQL_PASSWORD: avemariapass
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3308:3306"

  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8090:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: avemaria
      WORDPRESS_DB_USER: avemariauser
      WORDPRESS_DB_PASSWORD: avemariapass
      WORDPRESS_DEBUG: "1"
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/avemaria:/var/www/html/wp-content/themes/avemaria

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8091:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpass

volumes:
  db_data:
  wp_data:
